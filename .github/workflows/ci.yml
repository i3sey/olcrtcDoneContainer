name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m

  build-cli:
    name: Build CLI (Binaries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          
      - name: Install Mage
        run: go install github.com/magefile/mage@latest
        
      - name: Build CLI (Cross)
        run: mage cross
        
      - name: Upload CLI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: olcrtc-cli-binaries
          path: build/

  build-android:
    name: Build Android (AAR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          
      - name: Install Mage
        run: go install github.com/magefile/mage@latest
        
      - name: Build Mobile
        run: mage mobile
        
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olcrtc-android
          path: build/olcrtc.aar

  build-image:
    name: Build Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          tags: olcrtc:latest
          outputs: type=docker,dest=${{ runner.temp }}/olcrtc-${{ matrix.arch }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: olcrtc-image-${{ matrix.arch }}
          path: ${{ runner.temp }}/olcrtc-${{ matrix.arch }}.tar

  publish-release:
    name: Publish Image Assets
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build-image
    permissions:
      contents: write
    steps:
      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest image assets
          make_latest: true
          prerelease: true
          files: |
            dist/**/olcrtc-*.tar
